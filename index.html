<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Header</h1> 
        </div>
        <div class="nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
        <div class="content">
            <h2>Content</h2>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvThhPGFMjmP2S2dCHaCYN1z6EgKraWFP2o4spRXXInA&s=10" alt="Sample Image" height="150">
            <p id="img">This is the main content area.</p>
        </div>
        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>This is the sidebar content.</p>
        </div>
        <data class="info">
            <h3>Data</h3>
            <p>This is the data section.</p>
        </data>
            <div class="data-table">
                <h4>Data Table</h4>
            <table border="1">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                </tr>
                <tr>
                    <td>John Doe</td>
                    <td>30</td>
                    <td>New York</td>
                </tr>
                <tr>
                    <td>Jane Smith</td>
                    <td>25</td>
                    <td>Los Angeles</td>
                </tr>
            </table>
            </div>
        <div class="footer">
            <p>Footer</p>
        </div>
    </div>
    
</body>
</html>
